<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere | Premium Global AQI Monitor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Floating Header -->
        <header class="glass-container header-panel fade-in">
            <div class="header-content">
                <div class="logo-area">
                    <span class="logo-emoji">🌍</span>
                    <div class="logo-text">
                        <h1>Atmosphere</h1>
                        <p>Live Global Air Quality</p>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search any city or country...">
                    <button id="search-btn" aria-label="Search">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Map Area -->
        <main id="map-container">
            <div id="map"></div>
            <div class="loading-overlay" id="loading">
                <div class="spinner-container">
                    <div class="spinner"></div>
                    <div class="pulse"></div>
                </div>
                <p>Syncing atmospheric data...</p>
            </div>
        </main>

        <!-- Dynamic Details Panel (Hidden by default) -->
        <aside id="details-panel" class="glass-container details-panel slide-out">
            <button id="close-details" class="close-btn">&times;</button>
            <div id="details-content">
                <!-- Injected via Script -->
            </div>
        </aside>

        <!-- Floating Legend -->
        <footer class="legend-panel fade-in">
            <div class="glass-container legend-container">
                <div class="legend-grid">
                    <div class="legend-item" data-status="good"><span class="dot"></span><span>Good</span></div>
                    <div class="legend-item" data-status="moderate"><span class="dot"></span><span>Moderate</span></div>
                    <div class="legend-item" data-status="sensitive"><span class="dot"></span><span>Sensitive</span></div>
                    <div class="legend-item" data-status="unhealthy"><span class="dot"></span><span>Unhealthy</span></div>
                    <div class="legend-item" data-status="very-unhealthy"><span class="dot"></span><span>V. Unhealthy</span></div>
                    <div class="legend-item" data-status="hazardous"><span class="dot"></span><span>Hazardous</span></div>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="static/script.js"></script>
</body>

</html>
